# ── CRD: Keycloak ──────────────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloaks.k8s.keycloak.org
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: k8s.keycloak.org
  names:
    kind: Keycloak
    listKind: KeycloakList
    plural: keycloaks
    singular: keycloak
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type == 'Ready')].status
          name: Ready
          type: string
        - jsonPath: .status.conditions[?(@.type == 'Ready')].message
          name: Status
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v2alpha1
      schema:
        openAPIV3Schema:
          description: Keycloak is the Schema for the keycloaks API
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: KeycloakSpec defines the desired state of Keycloak
              properties:
                additionalOptions:
                  items:
                    properties:
                      name:
                        type: string
                      secret:
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                          - key
                          - name
                        type: object
                      value:
                        type: string
                    required:
                      - name
                    type: object
                  type: array
                db:
                  description: In-memory database configuration (dev only)
                  properties:
                    database:
                      type: string
                    host:
                      type: string
                    passwordSecret:
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - key
                        - name
                      type: object
                    pool:
                      properties:
                        initialSize:
                          type: integer
                        maxSize:
                          type: integer
                        minSize:
                          type: integer
                      type: object
                    port:
                      type: integer
                    schema:
                      type: string
                    usernameSecret:
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - key
                        - name
                      type: object
                    vendor:
                      type: string
                  type: object
                hostname:
                  description: Hostname configuration
                  properties:
                    admin:
                      type: string
                    adminUrl:
                      type: string
                    hostname:
                      type: string
                    strict:
                      type: boolean
                    strictBackchannel:
                      type: boolean
                  type: object
                http:
                  description: HTTP/TLS configuration
                  properties:
                    httpEnabled:
                      type: boolean
                    httpPort:
                      type: integer
                    httpsPort:
                      type: integer
                    tlsSecret:
                      type: string
                  type: object
                ingress:
                  description: Ingress/Route configuration
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      type: object
                    className:
                      type: string
                    enabled:
                      type: boolean
                  type: object
                instances:
                  description: Number of Keycloak instances
                  format: int32
                  type: integer
                proxy:
                  description: Proxy configuration
                  properties:
                    headers:
                      type: string
                  type: object
                resources:
                  description: Resource requirements for the Keycloak container
                  properties:
                    limits:
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      type: object
                    requests:
                      additionalProperties:
                        anyOf:
                          - type: integer
                          - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      type: object
                  type: object
                startOptimized:
                  description: Run in optimized (production) mode
                  type: boolean
                transaction:
                  description: Transaction settings
                  properties:
                    xaEnabled:
                      type: boolean
                  type: object
                unsupported:
                  description: Advanced/unsupported settings
                  properties:
                    podTemplate:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  type: object
              type: object
            status:
              description: KeycloakStatus defines the observed state of Keycloak
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        format: int64
                        type: integer
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - status
                      - type
                    type: object
                  type: array
                observedGeneration:
                  format: int64
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
---
# ── CRD: KeycloakRealmImport ───────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakrealmimports.k8s.keycloak.org
spec:
  group: k8s.keycloak.org
  names:
    kind: KeycloakRealmImport
    listKind: KeycloakRealmImportList
    plural: keycloakrealmimports
    singular: keycloakrealmimport
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type == 'Done')].status
          name: Done
          type: string
        - jsonPath: .status.conditions[?(@.type == 'Done')].message
          name: Status
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v2alpha1
      schema:
        openAPIV3Schema:
          description: KeycloakRealmImport is the Schema for the keycloakrealmimports API
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                keycloakCRName:
                  description: Name of the Keycloak CR this realm import targets
                  type: string
                realm:
                  description: Realm JSON representation
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              required:
                - keycloakCRName
                - realm
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        format: int64
                        type: integer
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - status
                      - type
                    type: object
                  type: array
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
---
# ── ServiceAccount ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-operator
  namespace: keycloak
---
# ── ClusterRole ────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloak-operator-clusterrole
rules:
  - apiGroups: [""]
    resources: [secrets, services, pods]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [statefulsets, deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [k8s.keycloak.org]
    resources: [keycloaks, keycloaks/status, keycloaks/finalizers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [k8s.keycloak.org]
    resources: [keycloakrealmimports, keycloakrealmimports/status, keycloakrealmimports/finalizers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
---
# ── ClusterRoleBinding ─────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-operator-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keycloak-operator-clusterrole
subjects:
  - kind: ServiceAccount
    name: keycloak-operator
    namespace: keycloak
---
# ── Operator Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-operator
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-operator
  template:
    metadata:
      labels:
        app: keycloak-operator
    spec:
      serviceAccountName: keycloak-operator
      containers:
        - name: keycloak-operator
          image: quay.io/keycloak/keycloak-operator:26.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: WATCH_NAMESPACE
              value: ""          # cluster-wide: observa todos los namespaces
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RELATED_IMAGE_KEYCLOAK
              value: quay.io/keycloak/keycloak:26.1.0
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
