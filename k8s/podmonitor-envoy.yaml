apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - envoy-gateway
  selector:
    matchLabels:
      gateway.envoyproxy.io/owning-gateway-name: go-app-gateway
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 15s
