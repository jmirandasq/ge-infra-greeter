name: Deploy Envoy Gateway

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-envoy-gateway.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Envoy Gateway
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Envoy Gateway
        run: |
          helm upgrade --install envoy-gateway \
            oci://docker.io/envoyproxy/gateway-helm \
            --version v1.3.2 \
            --namespace envoy-gateway \
            --create-namespace \
            --wait --timeout 3m

      - name: Show status
        run: kubectl get pods -n envoy-gateway
