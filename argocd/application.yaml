apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ge-go-greeter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jmirandasq/ge-infra-greeter
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ge-go-greeter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
